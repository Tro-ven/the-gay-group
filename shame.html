<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall of Shame</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <nav>
        <a href="index.html">The Arcs</a>
        <a href="roster.html">The Roster</a>
        <a href="shame.html" class="active">Wall of Shame</a>
    </nav>

    <header>
        <h1>Wall of Shame</h1>
        <p style="color: #666; letter-spacing: 3px;">Sabki Bezatti Yahan Hogi</p>
    </header>

    <div class="container" id="shame-display">
        <div class="card" style="text-align: center; opacity: 0.5;">
            <p>Scanning the archives for brainrot...</p>
        </div>
    </div>

    <script src="./main.js"></script>

    <script>
        // Tab Title Change
        let docTitle = document.title;
        window.addEventListener("blur", () => {
            document.title = "Varus blocked you! 💀";
        });
        window.addEventListener("focus", () => {
            document.title = docTitle;
        });

        // Aura Particle Spawner
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 3 + 4 + 's';
            
            const colors = ['var(--neon-purple)', 'var(--neon-cyan)', 'var(--gold)'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            particle.style.backgroundColor = randomColor;
            particle.style.boxShadow = `0 0 10px ${randomColor}`;

            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 7000);
        }
        setInterval(createParticle, 500);
    </script>
</body>
</html>
